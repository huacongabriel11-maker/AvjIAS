<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AvjIAS Chat</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f10;
      color: white;
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: #18181b;
      padding: 20px;
      border-right: 1px solid #2a2a2e;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 25px;
    }

    select, input, button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-bottom: 12px;
    }

    button {
      background: #7c3aed;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 18px;
      border-bottom: 1px solid #2a2a2e;
      font-size: 20px;
      font-weight: bold;
    }

    .chat {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .msg {
      max-width: 75%;
      padding: 14px;
      border-radius: 14px;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .user {
      background: #7c3aed;
      margin-left: auto;
    }

    .bot {
      background: #27272a;
      margin-right: auto;
    }

    .input-area {
      display: flex;
      gap: 10px;
      padding: 15px;
      border-top: 1px solid #2a2a2e;
    }

    .input-area input {
      flex: 1;
      margin: 0;
    }

    .input-area button {
      width: 120px;
      margin: 0;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="logo">AvjIAS</div>

    <label>Elegir IA</label>
    <select id="model">
      <option value="gemini">Gemini</option>
      <option value="gpt">ChatGPT</option>
      <option value="claude">Claude</option>
      <option value="deepseek">DeepSeek</option>
    </select>

    <input id="apiKey" placeholder="Tu x-api-key" type="password" />

    <button onclick="clearChat()">Borrar chat</button>
  </div>

  <div class="main">
    <div class="header" id="title">Chat con Gemini</div>

    <div class="chat" id="chat"></div>

    <div class="input-area">
      <input id="message" placeholder="Escribe tu mensaje..." />
      <button onclick="sendMessage()">Enviar</button>
    </div>
  </div>

<script>
const API_URL = "https://avjias.onrender.com/chat";

const chat = document.getElementById("chat");
const modelSelect = document.getElementById("model");
const title = document.getElementById("title");

let currentModel = modelSelect.value;

function loadChat() {
  chat.innerHTML = "";
  const saved = JSON.parse(localStorage.getItem("chat_" + currentModel)) || [];

  saved.forEach(m => addMessage(m.text, m.role, false));
  title.innerText = "Chat con " + currentModel.toUpperCase();
}

function saveMessage(text, role) {
  const saved = JSON.parse(localStorage.getItem("chat_" + currentModel)) || [];
  saved.push({ text, role });
  localStorage.setItem("chat_" + currentModel, JSON.stringify(saved));
}

function addMessage(text, role, save = true) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;

  if (save) saveMessage(text, role);
}

modelSelect.addEventListener("change", () => {
  currentModel = modelSelect.value;
  loadChat();
});

async function sendMessage() {
  const input = document.getElementById("message");
  const apiKey = document.getElementById("apiKey").value;
  const message = input.value.trim();

  if (!message) return;
  if (!apiKey) {
    alert("Pon tu x-api-key");
    return;
  }

  addMessage(message, "user");
  input.value = "";

  addMessage("Pensando...", "bot");

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey
      },
      body: JSON.stringify({
        model: currentModel,
        message
      })
    });

    const data = await res.json();

    chat.lastChild.remove();

    if (data.response) {
      addMessage(data.response, "bot");
    } else {
      addMessage("Error: " + (data.error || "No hubo respuesta"), "bot");
    }

  } catch (err) {
    chat.lastChild.remove();
    addMessage("Error conectando con la API", "bot");
  }
}

function clearChat() {
  localStorage.removeItem("chat_" + currentModel);
  loadChat();
}

loadChat();
</script>

</body>
</html>
