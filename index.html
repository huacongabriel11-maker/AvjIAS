<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AvjIAS Multi-IA Chat</title>
  <style>
    body { font-family: Arial, sans-serif; background: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; height: 100vh; margin: 0; }
    #chat-container { width: 90%; max-width: 600px; margin-top: 20px; flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
    .message { margin: 5px 0; padding: 8px 12px; border-radius: 12px; max-width: 80%; }
    .user { background: #1e88e5; align-self: flex-end; }
    .bot { background: #333; align-self: flex-start; }
    #input-container { width: 90%; max-width: 600px; display: flex; margin-bottom: 20px; }
    #input-container input { flex: 1; padding: 10px; border-radius: 8px; border: none; }
    #input-container button { padding: 10px 15px; margin-left: 10px; border: none; border-radius: 8px; background: #1e88e5; color: #fff; cursor: pointer; }
    #model-selector { margin-bottom: 10px; }
  </style>
</head>
<body>
  <h1>AvjIAS Multi-IA Chat</h1>

  <select id="model-selector">
    <option value="chatgpt">ChatGPT 5.5</option>
    <option value="claude">Claude 4.8</option>
    <option value="gemini">Gemini 3.1</option>
  </select>

  <div id="chat-container"></div>

  <div id="input-container">
    <input type="text" id="user-input" placeholder="Escribe un mensaje..." />
    <button onclick="sendMessage()">Enviar</button>
  </div>

  <script>
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const modelSelector = document.getElementById('model-selector');

    const histories = {
      chatgpt: JSON.parse(localStorage.getItem('history_chatgpt') || '[]'),
      claude: JSON.parse(localStorage.getItem('history_claude') || '[]'),
      gemini: JSON.parse(localStorage.getItem('history_gemini') || '[]')
    };

    function renderMessages() {
      chatContainer.innerHTML = '';
      const currentModel = modelSelector.value;
      histories[currentModel].forEach(msg => {
        const div = document.createElement('div');
        div.className = 'message ' + (msg.user ? 'user' : 'bot');
        div.textContent = msg.text;
        chatContainer.appendChild(div);
      });
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      const currentModel = modelSelector.value;
      histories[currentModel].push({ user: true, text });
      renderMessages();

      userInput.value = '';
      const endpoint = `/chat/${currentModel}`;

      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        const data = await res.json();
        histories[currentModel].push({ user: false, text: data.reply });
        localStorage.setItem('history_' + currentModel, JSON.stringify(histories[currentModel]));
        renderMessages();
      } catch (err) {
        histories[currentModel].push({ user: false, text: 'Error: no se pudo conectar con la IA.' });
        renderMessages();
      }
    }

    modelSelector.addEventListener('change', renderMessages);
    renderMessages();
  </script>
</body>
</html>
